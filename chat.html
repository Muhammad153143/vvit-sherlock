<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SherLock - Real-Time Chat</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            height: 80vh;
            border: 4px solid var(--primary-light);
        }

        .chat-header {
            padding: 1.5rem;
            background: var(--primary-color);
            color: white;
            border-top-left-radius: calc(var(--radius) - 4px);
            border-top-right-radius: calc(var(--radius) - 4px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #f9f9f9;
        }

        .message {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            position: relative;
            font-size: 1rem;
            line-height: 1.4;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 0.2rem;
        }

        .message.received {
            align-self: flex-start;
            background: #e0e0e0;
            color: var(--text-dark);
            border-bottom-left-radius: 0.2rem;
        }

        .message-info {
            font-size: 0.75rem;
            margin-top: 0.3rem;
            opacity: 0.8;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .chat-input-area {
            padding: 1.5rem;
            border-top: 1px solid #eee;
            display: flex;
            gap: 1rem;
        }

        .chat-input-area input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: 2px solid #eee;
            border-radius: 2rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input-area input:focus {
            border-color: var(--primary-color);
        }

        .chat-input-area button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .chat-input-area button:hover {
            transform: scale(1.05);
        }

        .item-info-bar {
            padding: 0.8rem 1.5rem;
            background: var(--primary-light);
            font-weight: bold;
            color: var(--primary-dark);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🏠 SherLock</a>
        <div class="nav-links" id="navLinks">
            <a href="index.html">🏠 Home</a>
            <a href="#" id="logoutBtn" style="display:none;">🚪 Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="chat-container">
            <div class="chat-header">
                <h2 id="chatWith">Chat 💬</h2>
                <span id="connectionStatus">🟡 Connecting...</span>
            </div>
            <div class="item-info-bar" id="itemInfo">
                Loading item details...
            </div>
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will appear here -->
            </div>
            <form class="chat-input-area" id="chatForm">
                <input type="text" id="messageInput" placeholder="Type your message..." required autocomplete="off">
                <button type="submit">Send 🚀</button>
            </form>
        </div>
    </div>

    <!-- Socket.IO Client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
