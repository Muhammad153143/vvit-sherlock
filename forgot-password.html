<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SherLock</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🏠 SherLock</a>
        <div class="nav-links" id="navLinks">
            <a href="index.html">🏠 Home</a>
            <a href="login.html">🔐 Login</a>
            <a href="register.html">📝 Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 500px; margin: 4rem auto;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <span style="font-size: 3rem;">🔑</span>
                <h2>Forgot Password</h2>
                <p style="color: var(--text-light);">Enter your email to receive a reset link</p>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <button type="submit" class="btn">Send Reset Link</button>
            </form>

            <div id="message" style="margin-top:1rem;"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgotForm');
        const messageEl = document.getElementById('message');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageEl.textContent = '';
            const email = document.getElementById('email').value.trim();
            try {
                const res = await fetch('/api/v1/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Request failed');
                messageEl.style.color = 'green';
                messageEl.textContent = 'If the email exists, a reset link has been sent.';
            } catch (err) {
                messageEl.style.color = 'red';
                messageEl.textContent = err.message;
            }
        });
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
