<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SherLock</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">SherLock 🔍</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Create Account</h2>
            <form id="registerForm">
                <div class="form-group">
                   <label for="name">Full Name</label>
                   <input type="text" id="name" required>
                </div>
              <div class="form-group">
                   <label for="username">Username</label>
                   <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" required autocomplete="new-password">
</div>
                <button type="submit" class="btn" style="width: 100%;">Register</button>
            </form>
            <p style="margin-top: 1rem; text-align: center;">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

         const name = document.getElementById('name').value;
         const username = document.getElementById('username').value; // ✅ ADD
         const email = document.getElementById('email').value;
         const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (password !== confirmPassword) {
    alert("Passwords do not match ❌");
    return;
}

    try {
        const data = await fetchAPI('/auth/register', {
            method: 'POST',
            body: JSON.stringify({ name, username, email, password }) // ✅ SEND
        });

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));

        window.location.href = 'index.html';
    } catch (error) {
        alert(error.message);
    }
});
    </script>
</body>
</html>
