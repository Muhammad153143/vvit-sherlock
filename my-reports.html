<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports - SherLock</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">SherLock 🔍</a>
        <div class="nav-links" id="navLinks">
            <!-- Populated by app.js -->
        </div>
    </nav>

    <div class="container">
        <h2>My Reported Items</h2>
        <br>
        <div id="my-items-list">
            <!-- Items loaded here -->
            <p>Loading...</p>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        const BASE_URL = "/api/v1";
        async function loadMyItems() {
            try {
                const items = await fetchAPI('/items/myitems');
                const list = document.getElementById('my-items-list');
                
                if (items.length === 0) {
                    list.innerHTML = '<p>You haven\'t reported any items yet.</p>';
                    return;
                }

              list.innerHTML = items.map(item => {

    const imageUrl = item.imageUrl && item.imageUrl.startsWith("http")
        ? item.imageUrl
        : "https://sherlock-campus.onrender.com" + item.imageUrl;

    return `
    <div class="card">

        <img 
            src="${imageUrl}" 
            style="width:200px;height:150px;object-fit:cover;margin-bottom:10px;"
            onerror="this.src='https://via.placeholder.com/200x150?text=No+Image'"
        />

        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
                <h3>${item.title} 
                    <span class="badge ${item.status}">
                        ${item.status.toUpperCase()}
                    </span>
                </h3>

                <p><strong>Type:</strong> ${item.type.toUpperCase()} | 
                <strong>Category:</strong> ${item.category}</p>

                <p><strong>Location:</strong> ${item.location} | 
                <strong>Date:</strong> ${new Date(item.date).toLocaleDateString()}</p>

                <p style="margin-top:0.5rem;">${item.description}</p>
            </div>

            <div style="display:flex; flex-direction:column; gap:0.5rem;">
                <button onclick="window.location.href='chat.html?itemId=${item._id}'" 
                    class="btn"
                    style="font-size:0.8rem;padding:0.5rem;position:relative;">
                    💬 Chat
                    <span class="unread-badge" id="unread-${item._id}" style="display:none; position:absolute; top:-8px; right:-8px; background:var(--danger); color:white; border-radius:50%; width:20px; height:20px; font-size:0.7rem; display:flex; align-items:center; justify-content:center;">0</span>
                </button>
                <button onclick="deleteItem('${item._id}')" 
                    class="btn btn-secondary"
                    style="background-color:var(--danger);font-size:0.8rem;padding:0.5rem;">
                    Delete
                </button>
            </div>
        </div>
    </div>
    `;
}).join('');
                
                // Trigger unread badges render
                if (typeof renderUnreadBadges === 'function') renderUnreadBadges();

            } catch (error) {
                console.error(error);
                document.getElementById('my-items-list').innerHTML = '<p>Error loading items.</p>';
            }
        }

        // Unread Badges Logic
        window.renderUnreadBadges = function() {
            if (!window.unreadChatCounts) return;
            
            Object.keys(window.unreadChatCounts).forEach(itemId => {
                const badge = document.getElementById(`unread-${itemId}`);
                if (badge) {
                    const count = window.unreadChatCounts[itemId];
                    if (count > 0) {
                        badge.textContent = count > 9 ? '9+' : count;
                        badge.style.display = 'flex';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            });
        };

        async function deleteItem(id) {
            if(!confirm('Are you sure you want to delete this item?')) return;
            try {
                await fetchAPI(`/v1/items/${id}`, { method: 'DELETE' });
                loadMyItems();
            } catch (error) {
                alert(error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadMyItems);
    </script>
</body>
</html>
